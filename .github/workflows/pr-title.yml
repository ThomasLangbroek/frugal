name: pr-title

# Squash-merge lands the PR title as the commit on main, which release-please
# reads to version the plugin. So the PR title must be a valid conventional
# commit. Runs on human PRs only; bot PRs (GITHUB_TOKEN) do not trigger it,
# which is fine because release-please's own titles are already conventional.

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
