name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.10", "3.13"]
    steps:
      - uses: actions/setup-python@v6
      - uses: actions/checkout@v7
        with:
          python-version: ${{ matrix.python }}
      - run: pip install pytest
      - run: pytest tests/ -q

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: manifests parse and shell syntax is sound
        run: |
          python3 -m json.tool .claude-plugin/plugin.json > /dev/null
          python3 -m json.tool .claude-plugin/marketplace.json > /dev/null
          python3 -m json.tool hooks/hooks.json > /dev/null
          bash -n hooks/guard_expensive.sh
      - name: plugin version is bumped when runtime files change
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1
          changed=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          if echo "$changed" | grep -qE '^(hooks|agents|skills|scripts)/' \
             && ! echo "$changed" | grep -q '^.claude-plugin/plugin.json$'; then
            echo "Runtime files changed without a version bump in .claude-plugin/plugin.json" >&2
            exit 1
          fi
